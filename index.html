<!DOCTYPE html>
<html>
<head>
<title>GroqAI Chatbot</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    margin-top:40px;
}
.container{
    display:flex;
    width:700px;
}
.history{
    width:200px;
    background:white;
    border-radius:10px 0 0 10px;
    padding:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    overflow-y:auto;
    height:420px;
}
.history h3{
    text-align:center;
}
.history-item{
    padding:8px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    font-size:14px;
}
.history-item:hover{
    background:#f0f0f0;
}
.chat-container{
    flex:1;
    background:white;
    padding:20px;
    border-radius:0 10px 10px 0;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
#chat-box{
    height:300px;
    overflow-y:auto;
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:10px;
}
.user{
    text-align:right;
    color:blue;
    margin:5px;
}
.bot{
    text-align:left;
    color:green;
    margin:5px;
}
.input-area{
    display:flex;
}
input{
    flex:1;
    padding:10px;
}
button{
    padding:10px 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="history">
    <h3>History</h3>
    <div id="history-list"></div>
</div>

<div class="chat-container">
    <h2>GroqAI Chatbot</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

</div>

<script>
let currentChat = null;

// Load previous chats from backend
async function loadChats(){
    const res = await fetch("/get_chats");
    const data = await res.json();
    const historyList = document.getElementById("history-list");
    historyList.innerHTML = "";

    for(let chat_id in data){
        const item = document.createElement("div");
        item.className = "history-item";
        item.textContent = data[chat_id].title;
        item.onclick = () => loadChatMessages(chat_id);
        historyList.appendChild(item);
    }
}

// Load messages of a specific chat
async function loadChatMessages(chat_id){
    currentChat = chat_id;
    const res = await fetch("/get_chats");
    const data = await res.json();
    const messages = data[chat_id].messages;
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = "";
    messages.forEach(m => {
        chatBox.innerHTML += `<div class="user"><b>You:</b> ${m.user}</div>`;
        chatBox.innerHTML += `<div class="bot"><b>Bot:</b> ${m.bot}</div>`;
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send message to backend
async function sendMessage(){
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if(!message) return;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
    input.value="";

    // If no chat started, create new
    if(!currentChat){
        const res = await fetch("/new_chat",{method:"POST"});
        const data = await res.json();
        currentChat = data.chat_id;
        await loadChats(); // refresh history panel
    }

    const response = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: message, chat_id: currentChat})
    });

    const data = await response.json();
    const botReply = data.reply || data.error || "No response";

    chatBox.innerHTML += `<div class="bot"><b>Bot:</b> ${botReply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
    await loadChats(); // refresh left panel titles
}

// Initial load
loadChats();

</script>

</body>
</html>
